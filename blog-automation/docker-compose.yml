services:
  blog-automation:
    build: .
    container_name: blog-automation
    restart: always
    env_file:
      - .env
    # Use host network to access Odoo at localhost:8069
    network_mode: host
    volumes:
      # Persist data and logs
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
