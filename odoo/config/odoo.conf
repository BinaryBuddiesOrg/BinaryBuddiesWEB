[options]
; =============================================================================
; ODOO SERVER CONFIGURATION
; Binary Buddies Web - Production Configuration
; =============================================================================

; -----------------------------------------------------------------------------
; Database Settings
; -----------------------------------------------------------------------------
db_host = localhost
db_port = 5432
db_user = odoo
db_password = False
db_name = bbweb_odoo
db_sslmode = prefer
; db_maxconn = 64
; db_template = template0

; Database filtering (for multi-tenant)
; dbfilter = ^%d$

; -----------------------------------------------------------------------------
; Server Settings
; -----------------------------------------------------------------------------
xmlrpc_port = 6534
longpolling_port = 8072
proxy_mode = True

; Addons paths (parent directories containing modules)
; /mnt/extra-addons contains binary_buddies_web
; OCA module repos: storage, server-tools, server-env contain multiple modules each
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/extra-addons/storage,/mnt/extra-addons/server-tools,/mnt/extra-addons/server-env

; Data directory
data_dir = /var/lib/odoo

; -----------------------------------------------------------------------------
; Performance Settings
; -----------------------------------------------------------------------------
; Workers (0 = disabled, use for dev; production: 2 * CPU cores + 1)
workers = 0

; Memory limits per worker (in bytes)
; limit_memory_hard = 2684354560
; limit_memory_soft = 2147483648

; Time limits (in seconds)
; limit_time_cpu = 60
; limit_time_real = 120
; limit_time_real_cron = -1

; Maximum requests per worker
; max_cron_threads = 2

; -----------------------------------------------------------------------------
; Logging
; -----------------------------------------------------------------------------
log_level = info
logfile = /var/log/odoo/odoo.log
log_handler = :INFO
; log_db = False
; log_db_level = warning

; -----------------------------------------------------------------------------
; Security
; -----------------------------------------------------------------------------
; admin_passwd = your_strong_admin_password
list_db = True
; server_wide_modules = base,web

; -----------------------------------------------------------------------------
; Static Files & Assets
; -----------------------------------------------------------------------------
; Disable attachment upload size limit (default 128MB)
; limit_request = 8196

; -----------------------------------------------------------------------------
; Demo Data
; -----------------------------------------------------------------------------
without_demo = all

; =============================================================================
; FS STORAGE CONFIGURATION - S3 + CloudFront
; Uses OCA server_environment pattern
; Environment variables are resolved when starting with $
; =============================================================================

[fs_storage.s3_attachments]
; Protocol for Amazon S3
protocol = s3

; S3 Connection Options (JSON format)
; Use environment variables for security (resolved by fs_storage)
options = {"key": "$AWS_ACCESS_KEY_ID", "secret": "$AWS_SECRET_ACCESS_KEY", "client_kwargs": {"region_name": "$AWS_S3_REGION"}}

; S3 Bucket name
directory_path = $AWS_S3_BUCKET

; Resolve environment variables (must be true for $ substitution)
resolve_env_vars = true

; Use as default storage for all attachments
use_as_default_for_attachments = true

; Optimize directory paths (prevents too many files in one folder)
optimizes_directory_path = true

; Auto cleanup files when deleted from Odoo
autovacuum_gc = true

; CloudFront Base URL for serving files
; This enables direct URL access from the CDN
base_url = https://$CLOUDFRONT_DOMAIN

; Include directory path (bucket name) in URL
is_directory_path_in_url = false

; Use filename obfuscation for security
use_filename_obfuscation = false

; Force small files and assets to stay in database for faster access
; ALL images now go to S3 for consistent storage
; Only JS and CSS files stay in DB for performance
force_db_for_default_attachment_rules = {"application/javascript": 0, "text/css": 0}

; X-Sendfile for Nginx proxy (enable if using reverse proxy)
; use_x_sendfile_to_serve_internal_url = true
; s3_uses_signed_url_for_x_sendfile = true
; s3_signed_url_expiration = 30


; -----------------------------------------------------------------------------
; Blog API Key (for programmatic blog creation)
; -----------------------------------------------------------------------------
blog_api_key = ecee2e3798db60821b8251f826673c495efbf2d88b2a1a4e3fa4107761beb549

